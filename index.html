    // Soft two-note chime + haptic.
    function useChime() {
      const ctxRef = useRef(null);
      return useCallback(() => {
        try {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (AC) {
            if (!ctxRef.current) ctxRef.current = new AC();
            const ctx = ctxRef.current;
            if (ctx.state === "suspended") ctx.resume();
            const t = ctx.currentTime;
            const o = ctx.createOscillator();
            const gg = ctx.createGain();
            o.type = "sine";
            o.frequency.setValueAtTime(880, t);
            o.frequency.setValueAtTime(1174.66, t + 0.13);
            gg.gain.setValueAtTime(0.0001, t);
            gg.gain.exponentialRampToValueAtTime(0.22, t + 0.02);
            gg.gain.exponentialRampToValueAtTime(0.0001, t + 0.5);
            o.connect(gg); gg.connect(ctx.destination);
            o.start(t); o.stop(t + 0.5);
          }
        } catch (e) {}
        try { if (navigator.vibrate) navigator.vibrate(110); } catch (e) {}
      }, []);
    }

    // Keep the screen awake while the app is open (iOS 16.4+, Android, desktop).
    function useWakeLock() {
      useEffect(() => {
        let lock = null;
        const request = async () => {
          try {
            if (!("wakeLock" in navigator)) return;
            if (lock && !lock.released) return;
            lock = await navigator.wakeLock.request("screen");
          } catch (e) {}
        };
        request();
        const onVis = () => { if (document.visibilityState === "visible") request(); };
        document.addEventListener("visibilitychange", onVis);
        window.addEventListener("pointerdown", request);
        return () => {
          document.removeEventListener("visibilitychange", onVis);
          window.removeEventListener("pointerdown", request);
          try { if (lock && !lock.released) lock.release(); } catch (e) {}
        };
      }, []);
    }

    function MobilityChecklist() {
      const [done, setDone] = useState(() => new Set());
      const [active, setActive] = useState(null); // { key, dur }
      const [running, setRunning] = useState(false);
      const [remaining, setRemaining] = useState(0);
      const [alarming, setAlarming] = useState(null); // stretch key
      const chime = useChime();

      // countdown
      useEffect(() => {
        if (!running || !active) return;
        const id = setInterval(() => setRemaining((r) => Math.max(0, r - 1)), 1000);
        return () => clearInterval(id);
      }, [running, active]);

      // completion → start ringing (does not auto-check; you pick the side)
      useEffect(() => {
        if (running && active && remaining === 0) {
          setAlarming(active.key);
          setRunning(false);
          setActive(null);
        }
      }, [remaining, running, active]);

      // ring until stopped (with a safety cap)
      useEffect(() => {
        if (!alarming) return;
        chime();
        let n = 0;
        const id = setInterval(() => {
          n += 1;
          if (n > 40) { clearInterval(id); setAlarming(null); return; } // ~60s cap
          chime();
        }, 1500);
        return () => clearInterval(id);
      }, [alarming, chime]);

      const onDur = useCallback((key, dur) => {
        setAlarming((a) => (a === key ? null : a));
        setActive((cur) => {
          if (cur && cur.key === key && cur.dur === dur) { setRunning((r) => !r); return cur; }
          setRemaining(dur); setRunning(true); return { key, dur };
        });
      }, []);
      const onReset = useCallback((key) => {
        setAlarming((a) => (a === key ? null : a));
        setActive((cur) => { if (cur && cur.key === key) { setRunning(false); setRemaining(0); return null; } return cur; });
      }, []);
      const onStop = useCallback((key) => { setAlarming((a) => (a === key ? null : a)); }, []);
      const toggleDone = useCallback((k) => {
        setDone((d) => { const n = new Set(d); n.has(k) ? n.delete(k) : n.add(k); return n; });
      }, []);
      const resetAll = useCallback(() => {
        setDone(new Set()); setActive(null); setRunning(false); setRemaining(0); setAlarming(null);
      }, []);

      const renderCheck = (ck, label) => {
        const on = done.has(ck);
        return (
          <button key={ck} className={"mob-check" + (label ? " sq" : "") + (on ? " on" : "")}
            onClick={() => toggleDone(ck)} aria-label={label ? `${label} side` : "toggle done"}>
            {on ? "✓" : (label || "")}
          </button>
        );
      };

      return (
        <div className="mob-wrap">
          <p className="mob-head">Mobility training</p>
          <div className="mob-body">
            <div className="mob-controls">
              <span className="mob-prog">
                {done.size === MOBILITY_TOTAL ? "all done ✓" : `${done.size} / ${MOBILITY_TOTAL} done`}
              </span>
              <button className="mr-ghost" style={{ padding: ".2rem .5rem", fontSize: ".8rem" }} onClick={resetAll}>reset all</button>
            </div>

            <div className="mob-scroll">
              {MOBILITY.map((sec) => (
                <div key={sec.section}>
                  <div className="mob-section">{sec.section}</div>
                  {sec.items.map((it) => {
                    const name = itemName(it);
                    const sides = itemSides(it);
                    const key = sec.section + "::" + name;
                    const isActive = active && active.key === key;
                    const isAlarming = alarming === key;
                    return (
                      <div className="mob-item" key={key}>
                        <div className="mob-line">
                          {sides ? (
                            <div className="mob-sides">
                              {renderCheck(key + "::L", "L")}
                              {renderCheck(key + "::R", "R")}
                            </div>
                          ) : renderCheck(key + "::x", "")}
                          <button className={"mob-label" + (
                            sides
                              ? (done.has(key + "::L") && done.has(key + "::R") ? " on" : "")
                              : (done.has(key + "::x") ? " on" : "")
                          )} onClick={() => toggleDone((sides ? key + "::L" : key + "::x"))}>
                            {name}
                          </button>
                        </div>
                        {sec.timed && (
                          <div className="mob-timer">
                            {HOLDS.map((dur) => {
                              const onThis = isActive && active.dur === dur;
                              return (
                                <button key={dur} className={"mob-chip" + (onThis && running ? " run" : "")}
                                  onClick={() => onDur(key, dur)} aria-label={`${dur} second hold`}>
                                  {onThis ? `${fmt(remaining)} ${running ? "⏸" : "▶"}` : `▶ ${dur}s`}
                                </button>
                              );
                            })}
                            {isActive && <button className="mob-reset" onClick={() => onReset(key)} aria-label="Reset timer">↺</button>}
                            {isAlarming && <button className="mob-stop" onClick={() => onStop(key)}>⏹ Stop</button>}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // Calm ambient outdoors scene for the final screen (theme-aware).
    function Scene({ theme }) {
      if (theme === "dark") {
        const stars = [
          { t: "12%", l: "18%", d: "0s" }, { t: "20%", l: "70%", d: "1.1s" },
          { t: "28%", l: "40%", d: "2s" }, { t: "16%", l: "85%", d: ".6s" },
          { t: "34%", l: "12%", d: "1.6s" }, { t: "10%", l: "55%", d: "2.4s" },
          { t: "40%", l: "78%", d: ".9s" }, { t: "24%", l: "30%", d: "1.9s" },
        ];
        return (
          <div className="scene" aria-hidden="true">
            <div className="moon" />
            {stars.map((s, i) => <div className="star" key={i} style={{ top: s.t, left: s.l, animationDelay: s.d }} />)}
            <div className="hill h1" /><div className="hill h2" />
          </div>
        );
      }
      return (
        <div className="scene" aria-hidden="true">
          <div className="sun" />
          <div className="cloud c1" /><div className="cloud c2" /><div className="cloud c3" />
          <div className="hill h1" /><div className="hill h2" />
        </div>
      );
    }

    function Routine() {
      useWakeLock();
      const [mode, setMode] = useState("morning");
      const [pos, setPos] = useState(0);
      const [loaded, setLoaded] = useState(false);

      useEffect(() => {
        try {
          const saved = localStorage.getItem(MODE_KEY);
          if (saved === "morning" || saved === "night") setMode(saved);
          else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) setMode("night");
        } catch (e) {}
      }, []);

      useEffect(() => {
        const cap = STEPS_BY_MODE[mode].length + 1;
        let p = 0;
        try {
          const raw = localStorage.getItem(progKey(mode));
          if (raw) {
            const s = JSON.parse(raw);
            if (s.date === todayStr() && typeof s.pos === "number") p = Math.max(0, Math.min(cap, s.pos));
          }
        } catch (e) {}
        setPos(p);
        setLoaded(true);
      }, [mode]);

      const go = useCallback((next) => {
        const cap = STEPS_BY_MODE[mode].length + 1;
        const clamped = Math.max(0, Math.min(cap, next));
        setPos(clamped);
        try { localStorage.setItem(progKey(mode), JSON.stringify({ date: todayStr(), pos: clamped })); } catch (e) {}
      }, [mode]);

      const toggleMode = useCallback(() => {
        setMode((m) => {
          const next = m === "night" ? "morning" : "night";
          try { localStorage.setItem(MODE_KEY, next); } catch (e) {}
          return next;
        });
      }, []);

      const steps = STEPS_BY_MODE[mode];
      const N = steps.length;
      const theme = MODE_META[mode].theme;
      const mobilityIdx = steps.findIndex((s) => s.toLowerCase().includes("mobility training"));

      const g = GRADIENTS[theme];
      const frac = Math.min(1, Math.max(0, pos / (N + 1)));
      const rootStyle = {
        background: `linear-gradient(180deg, ${lerpHex(g.COOL_TOP, g.WARM_TOP, frac)} 0%, ${lerpHex(
          g.COOL_BOT, g.WARM_BOT, frac
        )} 100%)`,
      };

      if (!loaded) {
        return <div className="mr-root" data-theme={theme} style={rootStyle}><style>{CSS}</style></div>;
      }

      const isIntro = pos === 0;
      const isDone = pos === N + 1;
      const isStep = !isIntro && !isDone;
      const stepIdx = pos - 1;
      const isMobility = isStep && stepIdx === mobilityIdx;

      return (
        <div className="mr-root" data-theme={theme} style={rootStyle}>
          <style>{CSS}</style>
          <div className="mr-frame">
            <button className="mr-theme" onClick={toggleMode} aria-label="Switch between morning and night routine">
              {mode === "night" ? "☀" : "☾"}
            </button>

            <header className="mr-top">
              {isStep && (
                <>
                  <div className="mr-eyebrow">{MODE_META[mode].label} · step {pos} of {N}</div>
                  <div className="mr-track"><div className="mr-fill" style={{ width: `${(pos / N) * 100}%` }} /></div>
                </>
              )}
            </header>

            <main className={"mr-main" + (isMobility ? " mob" : "")}>
              {isIntro && (
                <div className="mr-intro">
                  {INTRO_LINE[mode] && <p className="mr-intro-line" key={mode}>{INTRO_LINE[mode]}</p>}
                  <button className="mr-btn mr-mantra" key={mode + "-btn"} onClick={() => go(1)}>{MANTRA}</button>
                </div>
              )}
              {isStep && !isMobility && (() => {
                const link = stepLink(steps[stepIdx]);
                return (
                  <div className="mr-stepwrap" key={mode + pos}>
                    <p className="mr-step">{steps[stepIdx]}</p>
                    {link && <a className="mr-link" href={link.href}>{link.label}</a>}
                  </div>
                );
              })()}
              {isMobility && <MobilityChecklist key={mode + pos} />}
              {isDone && (
                <>
                  <Scene theme={theme} />
                  <div className="mr-donetext">
                    <p className="mr-lead">That's the routine.</p>
                    <p className="mr-sub">{MODE_META[mode].doneSub}</p>
                  </div>
                </>
              )}
            </main>

            <footer className="mr-bottom">
              {isStep && (
                <>
                  <button className="mr-btn" onClick={() => go(pos + 1)}>Done</button>
                  <button className="mr-ghost" onClick={() => go(pos - 1)}>‹ Back</button>
                </>
              )}
              {isDone && (
                <div className="mr-donebtns">
                  <button className="mr-ghost" onClick={() => go(N)}>‹ Back</button>
                  <button className="mr-ghost" onClick={() => go(0)}>Start over</button>
                </div>
              )}
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Routine />);
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => { navigator.serviceWorker.register("sw.js").catch(() => {}); });
    }
  </script>
</body>
</html>
